name: Daily App Feedback Analysis

permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv google-play-scraper
          pip install app-store-scraper --no-deps
          pip install requests urllib3 certifi

      - name: Run Agent Script
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python main.py

      - name: Commit History Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Data: Update review history und Dashboard"
          file_pattern: data/*.json public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public